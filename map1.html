<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Seattle Illegal Dumping</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="sidebar">
    <h2>Illegal Dumping Points</h2>
    <div id="legend">
      <h3>Legend</h3>
      <p class="legend-point"><span class="color-dumping"></span> Illegal Dumping</p>
    </div>
  </div>

  <div id="map"></div>

  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

  <script>
    mapboxgl.accessToken = 'pk.eyJ1IjoicGhpbGlwa2xlZW1hbm4yIiwiYSI6ImNtaWp5c2p2MDE2a3IzZXBtYnBjeDliNGoifQ.o5jwuQrTIuQ983mQAx4BwQ';

    const map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/mapbox/dark-v10',
      center: [-122.33, 47.61],
      zoom: 12
    });

    map.addControl(new mapboxgl.NavigationControl());

    map.on('load', async () => {
      const dumpingData = await fetch('assets/dumping.geojson').then(res => res.json());

      map.addSource('dumping', { type: 'geojson', data: dumpingData });

      map.addLayer({
        id: 'dumping-layer',
        type: 'circle',
        source: 'dumping',
        paint: {
          'circle-radius': 6,
          'circle-color': '#E74C3C',
          'circle-opacity': 0.8,
          'circle-stroke-width': 1,
          'circle-stroke-color': '#fff'
        }
      });
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Seattle Waste Dumpings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body data-map="final">

  <div id="sidebar">
    <h2>Seattle Waste Dumpings</h2>
    <div id="legend">
  <h3>Legend</h3>

  <!-- Point Layers -->
  <p class="legend-point"><span class="color-dumping"></span> Illegal Dumping</p>
  <p class="legend-point"><span class="color-underdrains"></span> Underdrains</p>

  <!-- Equity Index choropleth (systemic disadvantage) -->
  <p class="legend-equity-title">Equity (hover tract):</p>
  <div class="legend-item">
    <div class="legend-color" data-level="low"></div> Lowest
  </div>
  <div class="legend-item">
    <div class="legend-color" data-level="med-low"></div> Second Lowest
  </div>
  <div class="legend-item">
    <div class="legend-color" data-level="medium"></div> Middle
  </div>
  <div class="legend-item">
    <div class="legend-color" data-level="med-high"></div> Second Highest
  </div>
  <div class="legend-item">
    <div class="legend-color" data-level="high"></div> Highest Equity Priority
  </div>
</div>

    <div id="chart-quintile" class="chart-panel">
      <h4 class="chart-title">Chart A: Dumping Frequency by Equity Quintile</h4>
      <canvas id="quintileChart"></canvas>
    </div>
    
    <button id="reset">Reset Map</button>
  </div>

  <div id="map"></div>

  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="js/main.js"></script>

</body>
</html>
